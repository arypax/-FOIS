<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Interactions Question Bank - Interactive Test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eaeaea;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        .section-title {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            margin: 25px 0 15px;
            font-size: 1.2rem;
        }
        
        .question {
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
            transition: all 0.3s ease;
        }
        
        .question:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .question-number {
            font-weight: bold;
            color: #3498db;
            font-size: 1.1rem;
        }
        
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        
        .option {
            display: flex;
            align-items: flex-start;
            padding: 12px 15px;
            background-color: white;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: all 0.2s ease;
        }
        
        .option:hover {
            background-color: #f0f8ff;
            border-color: #3498db;
        }
        
        .option.selected {
            background-color: #e1f5fe;
            border-color: #3498db;
            font-weight: bold;
        }
        
        .option.correct {
            background-color: #d4edda;
            border-color: #28a745;
        }
        
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #dc3545;
        }
        
        .option-label {
            display: inline-block;
            width: 30px;
            font-weight: bold;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .option-text {
            flex-grow: 1;
        }
        
        .result-indicator {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            margin-left: 10px;
            text-align: center;
            line-height: 24px;
            font-size: 14px;
        }
        
        .result-correct {
            background-color: #28a745;
            color: white;
        }
        
        .result-incorrect {
            background-color: #dc3545;
            color: white;
        }
        
        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        
        .correct-feedback {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .incorrect-feedback {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        #showResultsBtn {
            background-color: #2c3e50;
            color: white;
        }
        
        #showResultsBtn:hover {
            background-color: #1a252f;
        }
        
        #resetBtn {
            background-color: #95a5a6;
            color: white;
        }
        
        #resetBtn:hover {
            background-color: #7f8c8d;
        }
        
        .results-container {
            display: none;
            margin-top: 40px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
        }
        
        .score {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }
        
        .score-value {
            color: #3498db;
        }
        
        .results-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .result-item {
            margin-bottom: 20px;
            padding: 15px;
            background-color: white;
            border-radius: 6px;
            border-left: 4px solid #6c757d;
        }
        
        .result-item.correct {
            border-left-color: #28a745;
        }
        
        .result-item.incorrect {
            border-left-color: #dc3545;
        }
        
        .result-question {
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-choices {
            margin-top: 10px;
        }
        
        .result-choice {
            padding: 5px 10px;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        
        .user-choice {
            background-color: #e1f5fe;
            border: 1px solid #3498db;
        }
        
        .correct-choice {
            background-color: #d4edda;
            border: 1px solid #28a745;
        }
        
        .progress-bar {
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #3498db;
            width: 0%;
            transition: width 0.5s ease;
        }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background-color: #ecf0f1;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .filter-btn.active {
            background-color: #3498db;
            color: white;
        }
        
        .filter-btn:hover {
            background-color: #d5dbdb;
        }
        
        .filter-btn.active:hover {
            background-color: #2980b9;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .buttons, .filter-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            button, .filter-btn {
                width: 100%;
            }
            
            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HUMAN INTERACTIONS QUESTION BANK - PART 2</h1>
            <div class="subtitle">Interactive Test with 248 Questions - Answers are shown immediately after selection</div>
        </header>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalQuestions">248</div>
                <div class="stat-label">Total Questions</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="answeredQuestions">0</div>
                <div class="stat-label">Answered</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="correctAnswers">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="scorePercentage">0%</div>
                <div class="stat-label">Score</div>
            </div>
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All Questions</button>
            <button class="filter-btn" data-filter="answered">Answered</button>
            <button class="filter-btn" data-filter="unanswered">Unanswered</button>
            <button class="filter-btn" data-filter="correct">Correct</button>
            <button class="filter-btn" data-filter="incorrect">Incorrect</button>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div id="testContainer">
            <!-- Questions will be dynamically inserted here -->
        </div>
        
        <div class="buttons">
            <button id="showResultsBtn">Show Detailed Results</button>
            <button id="resetBtn">Reset Test</button>
        </div>
        
        <div class="results-container" id="resultsContainer">
            <div class="results-header">
                <h2>Test Results Summary</h2>
                <div class="score">Score: <span class="score-value" id="scoreValue">0/0</span></div>
            </div>
            <div class="results-list" id="resultsList">
                <!-- Results will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <!-- Подключаем файл с вопросами -->
    <script src="questions.js"></script>
    
    <script>
        // State to track user answers
        let userAnswers = {};
        let totalQuestions = questions.length;
        
        // Initialize the test
        function initTest() {
            const testContainer = document.getElementById('testContainer');
            testContainer.innerHTML = '';
            
            // Group questions by section
            const questionsBySection = {};
            questions.forEach(question => {
                if (!questionsBySection[question.section]) {
                    questionsBySection[question.section] = [];
                }
                questionsBySection[question.section].push(question);
            });
            
            // Create sections and questions
            Object.keys(questionsBySection).forEach(sectionName => {
                // Add section title
                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.textContent = sectionName;
                testContainer.appendChild(sectionTitle);
                
                // Add questions for this section
                questionsBySection[sectionName].forEach(question => {
                    const questionElement = createQuestionElement(question);
                    testContainer.appendChild(questionElement);
                });
            });
            
            // Initialize progress bar and stats
            updateProgressBar();
            updateStats();
            
            // Add event listeners to filter buttons
            setupFilterButtons();
        }
        
        // Create a question element
        function createQuestionElement(question) {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question';
            questionDiv.id = `question-${question.id}`;
            questionDiv.dataset.questionId = question.id;
            questionDiv.dataset.section = question.section;
            questionDiv.dataset.difficulty = question.difficulty;
            
            // Question header
            const questionHeader = document.createElement('div');
            questionHeader.className = 'question-header';
            
            const questionNumber = document.createElement('div');
            questionNumber.className = 'question-number';
            questionNumber.textContent = `Question ${question.id}`;
            
            const difficulty = document.createElement('div');
            difficulty.className = 'difficulty';
            difficulty.textContent = question.difficulty;
            difficulty.style.color = question.difficulty === 'HARD' ? '#e74c3c' : 
                                    question.difficulty === 'MEDIUM' ? '#f39c12' : '#27ae60';
            
            questionHeader.appendChild(questionNumber);
            questionHeader.appendChild(difficulty);
            
            // Question text
            const questionText = document.createElement('div');
            questionText.className = 'question-text';
            questionText.textContent = question.text;
            
            // Options container
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            
            // Create option elements
            question.options.forEach(option => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.dataset.optionId = option.id;
                optionDiv.dataset.questionId = question.id;
                
                // Option label (a, b, c, etc.)
                const optionLabel = document.createElement('div');
                optionLabel.className = 'option-label';
                optionLabel.textContent = `(${option.id})`;
                
                // Option text
                const optionText = document.createElement('div');
                optionText.className = 'option-text';
                optionText.textContent = option.text;
                
                optionDiv.appendChild(optionLabel);
                optionDiv.appendChild(optionText);
                
                // Add click event
                optionDiv.addEventListener('click', () => selectOption(question.id, option.id));
                
                optionsDiv.appendChild(optionDiv);
            });
            
            // Feedback element
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            feedbackDiv.id = `feedback-${question.id}`;
            
            questionDiv.appendChild(questionHeader);
            questionDiv.appendChild(questionText);
            questionDiv.appendChild(optionsDiv);
            questionDiv.appendChild(feedbackDiv);
            
            return questionDiv;
        }
        
        // Handle option selection
        function selectOption(questionId, optionId) {
            // Store user's answer
            userAnswers[questionId] = optionId;
            
            // Get the question
            const question = questions.find(q => q.id === questionId);
            
            // Update UI for this question
            const questionElement = document.getElementById(`question-${questionId}`);
            const options = questionElement.querySelectorAll('.option');
            const feedbackElement = document.getElementById(`feedback-${questionId}`);
            
            // Reset all options in this question
            options.forEach(option => {
                option.classList.remove('selected', 'correct', 'incorrect');
                
                // Remove any existing result indicators
                const existingIndicator = option.querySelector('.result-indicator');
                if (existingIndicator) {
                    existingIndicator.remove();
                }
            });
            
            // Mark selected option
            const selectedOption = questionElement.querySelector(`[data-option-id="${optionId}"]`);
            selectedOption.classList.add('selected');
            
            // Check if answer is correct
            const isCorrect = optionId === question.correctAnswer;
            
            // Mark correct and incorrect options
            options.forEach(option => {
                const optionId = option.dataset.optionId;
                
                if (optionId === question.correctAnswer) {
                    option.classList.add('correct');
                    
                    // Add correct indicator
                    const indicator = document.createElement('span');
                    indicator.className = 'result-indicator result-correct';
                    indicator.textContent = '✓';
                    option.appendChild(indicator);
                } 
                else if (optionId === optionId && !isCorrect) {
                    option.classList.add('incorrect');
                    
                    // Add incorrect indicator
                    const indicator = document.createElement('span');
                    indicator.className = 'result-indicator result-incorrect';
                    indicator.textContent = '✗';
                    option.appendChild(indicator);
                }
            });
            
            // Show feedback
            feedbackElement.textContent = isCorrect 
                ? `Correct! The answer is (${question.correctAnswer}): ${question.options.find(o => o.id === question.correctAnswer).text}`
                : `Incorrect. The correct answer is (${question.correctAnswer}): ${question.options.find(o => o.id === question.correctAnswer).text}`;
            
            feedbackElement.className = isCorrect ? 'feedback correct-feedback' : 'feedback incorrect-feedback';
            feedbackElement.style.display = 'block';
            
            // Update progress bar and stats
            updateProgressBar();
            updateStats();
        }
        
        // Update progress bar based on answered questions
        function updateProgressBar() {
            const answeredCount = Object.keys(userAnswers).length;
            const progressPercentage = (answeredCount / totalQuestions) * 100;
            
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = `${progressPercentage}%`;
        }
        
        // Update statistics
        function updateStats() {
            const answeredCount = Object.keys(userAnswers).length;
            let correctCount = 0;
            
            questions.forEach(question => {
                if (userAnswers[question.id] === question.correctAnswer) {
                    correctCount++;
                }
            });
            
            const scorePercentage = totalQuestions > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            
            document.getElementById('answeredQuestions').textContent = answeredCount;
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('scorePercentage').textContent = answeredCount > 0 ? `${scorePercentage}%` : "0%";
        }
        
        // Setup filter buttons
        function setupFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Remove active class from all buttons
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // Add active class to clicked button
                    button.classList.add('active');
                    
                    // Apply filter
                    const filter = button.dataset.filter;
                    applyFilter(filter);
                });
            });
        }
        
        // Apply filter to questions
        function applyFilter(filter) {
            const allQuestions = document.querySelectorAll('.question');
            
            allQuestions.forEach(question => {
                const questionId = parseInt(question.dataset.questionId);
                const userAnswer = userAnswers[questionId];
                const questionObj = questions.find(q => q.id === questionId);
                const isCorrect = userAnswer === questionObj.correctAnswer;
                
                let showQuestion = true;
                
                switch(filter) {
                    case 'answered':
                        showQuestion = userAnswer !== undefined;
                        break;
                    case 'unanswered':
                        showQuestion = userAnswer === undefined;
                        break;
                    case 'correct':
                        showQuestion = userAnswer !== undefined && isCorrect;
                        break;
                    case 'incorrect':
                        showQuestion = userAnswer !== undefined && !isCorrect;
                        break;
                    // 'all' shows all questions
                }
                
                question.style.display = showQuestion ? 'block' : 'none';
            });
        }
        
        // Show results
        function showResults() {
            // Calculate score
            let correctCount = 0;
            questions.forEach(question => {
                if (userAnswers[question.id] === question.correctAnswer) {
                    correctCount++;
                }
            });
            
            const answeredCount = Object.keys(userAnswers).length;
            const scorePercentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            
            // Update score display
            document.getElementById('scoreValue').textContent = `${correctCount}/${answeredCount} (${scorePercentage}%)`;
            
            // Generate results list
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            
            // Create summary by section
            const sectionResults = {};
            questions.forEach(question => {
                if (!sectionResults[question.section]) {
                    sectionResults[question.section] = {
                        total: 0,
                        correct: 0,
                        answered: 0
                    };
                }
                
                sectionResults[question.section].total++;
                
                if (userAnswers[question.id] !== undefined) {
                    sectionResults[question.section].answered++;
                    
                    if (userAnswers[question.id] === question.correctAnswer) {
                        sectionResults[question.section].correct++;
                    }
                }
            });
            
            // Add section summaries
            Object.keys(sectionResults).forEach(sectionName => {
                const sectionResult = sectionResults[sectionName];
                const sectionPercentage = sectionResult.answered > 0 ? 
                    Math.round((sectionResult.correct / sectionResult.answered) * 100) : 0;
                
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'result-item';
                sectionDiv.innerHTML = `
                    <div class="result-question" style="color: #3498db; font-size: 1.1rem;">
                        ${sectionName}
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                        <div>Total: ${sectionResult.total}</div>
                        <div>Answered: ${sectionResult.answered}</div>
                        <div>Correct: ${sectionResult.correct}</div>
                        <div>Score: ${sectionPercentage}%</div>
                    </div>
                `;
                resultsList.appendChild(sectionDiv);
            });
            
            // Add detailed results
            const detailedHeader = document.createElement('div');
            detailedHeader.className = 'result-question';
            detailedHeader.textContent = 'Detailed Results:';
            detailedHeader.style.marginTop = '20px';
            resultsList.appendChild(detailedHeader);
            
            questions.forEach(question => {
                const userAnswer = userAnswers[question.id];
                const isCorrect = userAnswer === question.correctAnswer;
                
                const resultItem = document.createElement('div');
                resultItem.className = `result-item ${userAnswer !== undefined ? (isCorrect ? 'correct' : 'incorrect') : ''}`;
                
                // Question text
                const resultQuestion = document.createElement('div');
                resultQuestion.className = 'result-question';
                resultQuestion.textContent = `${question.id}. ${question.text}`;
                
                // Choices
                const resultChoices = document.createElement('div');
                resultChoices.className = 'result-choices';
                
                question.options.forEach(option => {
                    const choiceDiv = document.createElement('div');
                    choiceDiv.className = 'result-choice';
                    
                    let choiceText = `(${option.id}) ${option.text}`;
                    
                    // Highlight user's choice
                    if (option.id === userAnswer) {
                        choiceDiv.classList.add('user-choice');
                        choiceText += ' (Your choice)';
                    }
                    
                    // Highlight correct answer
                    if (option.id === question.correctAnswer) {
                        choiceDiv.classList.add('correct-choice');
                        choiceText += ' (Correct answer)';
                    }
                    
                    choiceDiv.textContent = choiceText;
                    resultChoices.appendChild(choiceDiv);
                });
                
                // Status indicator
                const statusDiv = document.createElement('div');
                statusDiv.style.marginTop = '10px';
                statusDiv.style.fontWeight = 'bold';
                
                if (userAnswer === undefined) {
                    statusDiv.textContent = 'Not answered';
                    statusDiv.style.color = '#6c757d';
                } else if (isCorrect) {
                    statusDiv.textContent = '✓ Correct';
                    statusDiv.style.color = '#28a745';
                } else {
                    statusDiv.textContent = '✗ Incorrect';
                    statusDiv.style.color = '#dc3545';
                }
                
                resultItem.appendChild(resultQuestion);
                resultItem.appendChild(resultChoices);
                resultItem.appendChild(statusDiv);
                resultsList.appendChild(resultItem);
            });
            
            // Show results container
            document.getElementById('resultsContainer').style.display = 'block';
            
            // Scroll to results
            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth' });
        }
        
        // Reset the test
        function resetTest() {
            if (confirm('Are you sure you want to reset the test? All your answers will be lost.')) {
                userAnswers = {};
                initTest();
                document.getElementById('resultsContainer').style.display = 'none';
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            initTest();
            
            // Add event listeners to buttons
            document.getElementById('showResultsBtn').addEventListener('click', showResults);
            document.getElementById('resetBtn').addEventListener('click', resetTest);
        });
    </script>
</body>
</html>
