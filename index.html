            if (currentLangText) currentLangText.textContent = data.text;
            
            // Update selected state in dropdown
            document.querySelectorAll('.lang-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.dataset.lang === lang) {
                    opt.classList.add('selected');
                }
            });
            
            applyTranslations();
        }

        function t(key) {
            return translations[currentLang][key] || translations.ru[key] || key;
        }

        function applyTranslations() {
            // Update all elements with data-i18n attribute
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                // Для кнопок навигации обновляем только span, чтобы не удалить SVG
                if (el.id === 'prevQuestionBtn' || el.id === 'nextQuestionBtn') {
                    const span = el.querySelector('span');
                    if (span) span.textContent = t(key);
                } else {
                    el.textContent = t(key);
                }
            });

            // Update dynamic content
            updateDynamicTexts();
        }

        function updateDynamicTexts() {
            // Update stats labels
            const statLabels = document.querySelectorAll('.stat-label');
            if (statLabels.length >= 4) {
                statLabels[0].textContent = t('totalQuestions');
                statLabels[1].textContent = t('answered');
                statLabels[2].textContent = t('correct');
                statLabels[3].textContent = t('percentage');
            }

            // Update pager buttons
            const prevBtn = document.getElementById('prevQuestionBtn');
            const nextBtn = document.getElementById('nextQuestionBtn');
            if (prevBtn) {
                const span = prevBtn.querySelector('span');
                if (span) span.textContent = t('prev');
            }
            if (nextBtn) {
                const span = nextBtn.querySelector('span');
                if (span) span.textContent = t('next');
            }

            // Update main buttons
            const showResultsBtn = document.getElementById('showResultsBtn');
            if (showResultsBtn && showResultsBtn.textContent.includes('Скрыть') === false && showResultsBtn.textContent.includes('Жасыру') === false) {
                showResultsBtn.textContent = t('showResults');
            }

            // Update pager info if visible
            const pagerInfo = document.getElementById('pagerInfo');
            if (pagerInfo && orderedQuestions.length > 0) {
                pagerInfo.textContent = `${t('question')} ${currentIndex + 1} ${t('of')} ${orderedQuestions.length}`;
            }
        }

        // ---------- Utils ----------
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadSettings() {
            try {
                const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
                if (!raw) return { ...defaultSettings };
                const parsed = JSON.parse(raw);
                return {
                    shuffleQuestions: parsed.shuffleQuestions !== undefined ? !!parsed.shuffleQuestions : defaultSettings.shuffleQuestions,
                    shuffleAnswers: parsed.shuffleAnswers !== undefined ? !!parsed.shuffleAnswers : defaultSettings.shuffleAnswers,
                    showLetters: parsed.showLetters !== undefined ? !!parsed.showLetters : defaultSettings.showLetters,
                    showQuestionNumber: parsed.showQuestionNumber !== undefined ? !!parsed.showQuestionNumber : defaultSettings.showQuestionNumber,
                    showDifficulty: parsed.showDifficulty !== undefined ? !!parsed.showDifficulty : defaultSettings.showDifficulty,
                    mode: (parsed.mode === 'paged' || parsed.mode === 'scroll') ? parsed.mode : defaultSettings.mode,
                    testType: (parsed.testType === 'full' || parsed.testType === 'short' || parsed.testType === 'part1' || parsed.testType === 'part2') ? parsed.testType : defaultSettings.testType
                };
            } catch {
                return { ...defaultSettings };
            }
        }

        function saveSettings(next) {
            settings = { ...settings, ...next };
            localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(settings));
            applyLetterVisibility();
            applyHeaderVisibility();
            syncSettingsUI();
        }

        function applyLetterVisibility() {
            document.documentElement.dataset.showLetters = settings.showLetters ? 'true' : 'false';
        }

        function applyHeaderVisibility() {
            document.documentElement.dataset.showQnumber = settings.showQuestionNumber ? 'true' : 'false';
            document.documentElement.dataset.showDifficulty = settings.showDifficulty ? 'true' : 'false';
        }

        function syncSettingsUI() {
            const sq = document.getElementById('shuffleQuestionsToggle');
            const sa = document.getElementById('shuffleAnswersToggle');
            const sl = document.getElementById('showLettersToggle');
            const sn = document.getElementById('showQuestionNumberToggle');
            const sd = document.getElementById('showDifficultyToggle');
            if (sq) sq.checked = !!settings.shuffleQuestions;
            if (sa) sa.checked = !!settings.shuffleAnswers;
            if (sl) sl.checked = !!settings.showLetters;
            if (sn) sn.checked = !!settings.showQuestionNumber;
            if (sd) sd.checked = !!settings.showDifficulty;
            const radios = document.querySelectorAll('input[name="testMode"]');
            radios.forEach(r => r.checked = (r.value === settings.mode));
            syncModeCards();
            
            const testTypeRadios = document.querySelectorAll('input[name="testType"]');
            testTypeRadios.forEach(r => r.checked = (r.value === settings.testType));
            syncTestTypeCards();
        }

        function syncModeCards() {
            document.querySelectorAll('.mode-card').forEach(card => {
                const input = card.querySelector('input[type="radio"]');
                card.classList.toggle('selected', !!(input && input.checked));
            });
        }

        function syncTestTypeCards() {
            document.querySelectorAll('.mode-card[data-test-type]').forEach(card => {
                const input = card.querySelector('input[type="radio"]');
                card.classList.toggle('selected', !!(input && input.checked));
            });
        }

        function getSettingsFromUI() {
            const sq = document.getElementById('shuffleQuestionsToggle');
            const sa = document.getElementById('shuffleAnswersToggle');
            const sl = document.getElementById('showLettersToggle');
            const sn = document.getElementById('showQuestionNumberToggle');
            const sd = document.getElementById('showDifficultyToggle');
            const mode = (document.querySelector('input[name="testMode"]:checked') || {}).value || 'scroll';
            const testType = (document.querySelector('input[name="testType"]:checked') || {}).value || 'full';
            return {
                shuffleQuestions: !!(sq && sq.checked),
                shuffleAnswers: !!(sa && sa.checked),
                showLetters: !!(sl && sl.checked),
                showQuestionNumber: !!(sn && sn.checked),
                showDifficulty: !!(sd && sd.checked),
                mode: mode === 'paged' ? 'paged' : 'scroll',
                testType: (testType === 'full' || testType === 'short' || testType === 'part1' || testType === 'part2') ? testType : 'full'
            };
        }

        function formatOption(option) {
            return settings.showLetters ? `(${option.id}) ${option.text}` : option.text;
        }

        function getInitialTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark' || saved === 'light') return saved;
            return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            document.documentElement.dataset.theme = theme;
            localStorage.setItem('theme', theme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) toggle.checked = theme === 'dark';
        }
        
        // Build ordered questions list according to settings (keeps original `questions` intact)
        function getFilteredQuestions() {
            const isPart = (q, part) => (q && (q.part === part || q.part === String(part) || q.part === `part${part}`));
            const isNotLongestCorrectAnswer = (q) => {
                if (!q || !Array.isArray(q.options) || !q.options.length) return false;
                const correct = q.options.find(o => o && o.id === q.correctAnswer);
                if (!correct) return false;
                const lens = q.options.map(o => ((o && o.text) ? String(o.text).trim().length : 0));
                const maxLen = Math.max(...lens);
                const correctLen = (correct.text ? String(correct.text).trim().length : 0);
                return correctLen < maxLen;
            };

            if (settings.testType === 'part1') return questions.filter(q => isPart(q, 1));
            if (settings.testType === 'part2') return questions.filter(q => isPart(q, 2));
            if (settings.testType === 'short') return questions.filter(isNotLongestCorrectAnswer);
            return questions;
        }

        function getAnsweredCountForActiveQuestions() {
            if (!orderedQuestions.length) return 0;
            let count = 0;
            orderedQuestions.forEach(q => {
                if (userAnswers[q.id] !== undefined) count++;
            });
            return count;
        }

        function buildOrderedQuestions() {
            const questionsBySection = {};
            const filtered = getFilteredQuestions();
            filtered.forEach(q => {
                if (!questionsBySection[q.section]) questionsBySection[q.section] = [];
                questionsBySection[q.section].push(q);
            });

            const sections = Object.keys(questionsBySection);
            const list = [];
            sections.forEach(sectionName => {
                const arr = [...questionsBySection[sectionName]];
                if (settings.shuffleQuestions) shuffleArray(arr);
                arr.forEach(q => list.push(q));
            });
            return list;
        }

        function setModeUI() {
            const pager = document.getElementById('pager');
            if (settings.mode === 'paged') {
                if (pager) pager.style.display = 'flex';
            } else {
                if (pager) pager.style.display = 'none';
            }
        }

        function renderQuestionState(questionElement, question) {
            const saved = userAnswers[question.id];
            if (saved === undefined) return;

            // Reuse existing selection logic visuals without changing answer
            const options = questionElement.querySelectorAll('.option');
            options.forEach(opt => {
                opt.classList.remove('selected', 'correct', 'incorrect');
                const existingIndicator = opt.querySelector('.result-indicator');
                if (existingIndicator) existingIndicator.remove();
            });

            const selectedOption = questionElement.querySelector(`[data-option-id="${saved}"]`);
            if (selectedOption) selectedOption.classList.add('selected');

            const isCorrect = saved === question.correctAnswer;
            options.forEach(opt => {
                const currentOptionId = opt.dataset.optionId;
                if (currentOptionId === question.correctAnswer) {
                    opt.classList.add('correct');
                    const indicator = document.createElement('span');
                    indicator.className = 'result-indicator result-correct';
                    indicator.textContent = '✓';
                    opt.appendChild(indicator);
                } else if (!isCorrect && currentOptionId === saved) {
                    opt.classList.add('incorrect');
                    const indicator = document.createElement('span');
                    indicator.className = 'result-indicator result-incorrect';
                    indicator.textContent = '✗';
                    opt.appendChild(indicator);
                }
            });

        }

        function renderPaged() {
            const testContainer = document.getElementById('testContainer');
            testContainer.innerHTML = '';
            if (!orderedQuestions.length) return;

            const q = orderedQuestions[currentIndex];
            const questionElement = createQuestionElement(q, { showSectionInCard: true });
            testContainer.appendChild(questionElement);
            renderQuestionState(questionElement, q);

            const pagerInfo = document.getElementById('pagerInfo');
            if (pagerInfo) pagerInfo.textContent = `${t('question')} ${currentIndex + 1} ${t('of')} ${orderedQuestions.length}`;

            const prevBtn = document.getElementById('prevQuestionBtn');
            const nextBtn = document.getElementById('nextQuestionBtn');
            if (prevBtn) prevBtn.disabled = currentIndex <= 0;
            if (nextBtn) nextBtn.disabled = currentIndex >= orderedQuestions.length - 1;
            
            // Update dynamic texts
            updateDynamicTexts();
        }

        // Initialize the test
        function initTest() {
            const testContainer = document.getElementById('testContainer');
            testContainer.innerHTML = '';

            orderedQuestions = buildOrderedQuestions();
            totalQuestions = orderedQuestions.length;
            currentIndex = 0;
            setModeUI();

            if (settings.mode === 'paged') {
                renderPaged();
            } else {
                // Scroll mode: render grouped by section
                const questionsBySection = {};
                orderedQuestions.forEach(question => {
                    if (!questionsBySection[question.section]) questionsBySection[question.section] = [];
                    questionsBySection[question.section].push(question);
                });

                Object.keys(questionsBySection).forEach(sectionName => {
                    // Section titles are hidden during test
                    // const sectionTitle = document.createElement('div');
                    // sectionTitle.className = 'section-title';
                    // sectionTitle.textContent = sectionName;
                    // testContainer.appendChild(sectionTitle);

                    questionsBySection[sectionName].forEach(question => {
                        const questionElement = createQuestionElement(question, { showSectionInCard: false });
                        testContainer.appendChild(questionElement);
                        renderQuestionState(questionElement, question);
                    });
                });
            }
            
            // Show progress bar and stats when test starts
            const progressBar = document.querySelector('.progress-bar');
            if (progressBar) {
                progressBar.classList.add('test-started');
            }
            
            const statsContainer = document.querySelector('.stats');
            if (statsContainer) {
                statsContainer.classList.add('test-started');
            }
            
            // Initialize progress bar and stats
            updateProgressBar();
            updateStats();
            
            // Hide results button container when starting test
            const buttonsContainer = document.querySelector('.buttons');
            if (buttonsContainer) {
                buttonsContainer.classList.remove('has-answers');
            }
            
            // Update dynamic texts after rendering
            updateDynamicTexts();
        }
        
        // Create a question element
        function createQuestionElement(question, opts = {}) {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question';
            questionDiv.id = `question-${question.id}`;
            questionDiv.dataset.questionId = question.id;
            questionDiv.dataset.section = question.section;
            questionDiv.dataset.difficulty = question.difficulty;
            
            // Question header
            const questionHeader = document.createElement('div');
            questionHeader.className = 'question-header';
            
            const questionNumber = document.createElement('div');
            questionNumber.className = 'question-number';
            questionNumber.textContent = `${t('question')} ${question.id}`;
            
            const difficulty = document.createElement('div');
            difficulty.className = 'question-difficulty';
            const diffBadge = document.createElement('span');
            diffBadge.className = 'difficulty-badge';
            diffBadge.textContent = question.difficulty;
            const diff = (question.difficulty || '').toUpperCase();
            if (diff === 'HARD') diffBadge.classList.add('hard');
            else if (diff === 'MEDIUM') diffBadge.classList.add('medium');
            else diffBadge.classList.add('easy');
            difficulty.appendChild(diffBadge);
            
            questionHeader.appendChild(questionNumber);
            questionHeader.appendChild(difficulty);

            if (opts.showSectionInCard) {
                const sectionBadge = document.createElement('div');
                sectionBadge.className = 'question-section';
                sectionBadge.textContent = question.section;
                sectionBadge.style.color = 'var(--muted)';
                sectionBadge.style.fontSize = '0.9rem';
                questionHeader.appendChild(sectionBadge);
            }
            
            // Question text
            const questionText = document.createElement('div');
            questionText.className = 'question-text';
            questionText.textContent = question.text;
            
            // Options container
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            
            // Create option elements
            const optionsForRender = settings.shuffleAnswers ? shuffleArray([...question.options]) : [...question.options];
            optionsForRender.forEach(option => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.dataset.optionId = option.id;
                optionDiv.dataset.questionId = question.id;
                optionDiv.tabIndex = 0;
                
                // Option label (a, b, c, etc.)
                const optionLabel = document.createElement('div');
                optionLabel.className = 'option-label';
                optionLabel.textContent = `(${option.id})`;
                
                // Option text
                const optionText = document.createElement('div');
                optionText.className = 'option-text';
                optionText.textContent = option.text;
                
                optionDiv.appendChild(optionLabel);
                optionDiv.appendChild(optionText);
                
                // Add click event
                optionDiv.addEventListener('click', () => selectOption(question.id, option.id));
                optionDiv.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        selectOption(question.id, option.id);
                    }
                });
                
                optionsDiv.appendChild(optionDiv);
            });
            
            questionDiv.appendChild(questionHeader);
            questionDiv.appendChild(questionText);
            questionDiv.appendChild(optionsDiv);
            
            return questionDiv;
        }
        
        // Handle option selection
        function selectOption(questionId, optionId) {
            // Store user's answer
            userAnswers[questionId] = optionId;
            
            // Get the question
            const question = questions.find(q => q.id === questionId);
            
            // Update UI for this question
            const questionElement = document.getElementById(`question-${questionId}`);
            const options = questionElement.querySelectorAll('.option');
            // Reset all options in this question
            options.forEach(option => {
                option.classList.remove('selected', 'correct', 'incorrect');
                
                // Remove any existing result indicators
                const existingIndicator = option.querySelector('.result-indicator');
                if (existingIndicator) {
                    existingIndicator.remove();
                }
            });
            
            // Mark selected option
            const selectedOption = questionElement.querySelector(`[data-option-id="${optionId}"]`);
            selectedOption.classList.add('selected');
            
            // Check if answer is correct
            const isCorrect = optionId === question.correctAnswer;
            
            // Mark correct and incorrect options
            options.forEach(option => {
                const currentOptionId = option.dataset.optionId;
                
                if (currentOptionId === question.correctAnswer) {
                    option.classList.add('correct');
                    
                    // Add correct indicator
                    const indicator = document.createElement('span');
                    indicator.className = 'result-indicator result-correct';
                    indicator.textContent = '✓';
                    option.appendChild(indicator);
                } 
                else if (!isCorrect && currentOptionId === optionId) {
                    option.classList.add('incorrect');
                    
                    // Add incorrect indicator
                    const indicator = document.createElement('span');
                    indicator.className = 'result-indicator result-incorrect';
                    indicator.textContent = '✗';
                    option.appendChild(indicator);
                }
            });
            
            // Update progress bar and stats
            updateProgressBar();
            updateStats();
            
            // Show results button container if there are answers
            const buttonsContainer = document.querySelector('.buttons');
            if (buttonsContainer && Object.keys(userAnswers).length > 0) {
                buttonsContainer.classList.add('has-answers');
            }
        }
        
        // Update progress bar based on answered questions
        function updateProgressBar() {
            const answeredCount = getAnsweredCountForActiveQuestions();
            const progressPercentage = (answeredCount / totalQuestions) * 100;
            
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = `${progressPercentage}%`;
        }
        
        // Update statistics
        function updateStats() {
            const answeredCount = getAnsweredCountForActiveQuestions();
            let correctCount = 0;
            
            orderedQuestions.forEach(question => {
                if (userAnswers[question.id] === question.correctAnswer) {
                    correctCount++;
                }
            });
            
            const scorePercentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            
            const totalEl = document.getElementById('totalQuestions');
            if (totalEl) totalEl.textContent = String(totalQuestions);
            document.getElementById('answeredQuestions').textContent = answeredCount;
            document.getElementById('correctAnswers').textContent = correctCount;
            document.getElementById('scorePercentage').textContent = answeredCount > 0 ? `${scorePercentage}%` : "0%";
        }
        
        // Show results
        function toggleResults() {
            const resultsContainer = document.getElementById('resultsContainer');
            const btn = document.getElementById('showResultsBtn');
            const isVisible = resultsContainer && resultsContainer.style.display === 'block';
            if (isVisible) {
                resultsContainer.style.display = 'none';
                if (btn) btn.textContent = t('showResults');
                return;
            }

            // Calculate score
            let correctCount = 0;
            orderedQuestions.forEach(question => {
                if (userAnswers[question.id] === question.correctAnswer) {
                    correctCount++;
                }
            });
            
            const answeredCount = Object.keys(userAnswers).length;
            const scorePercentage = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            
            // Update score display
            document.getElementById('scoreValue').textContent = `${correctCount}/${answeredCount} (${scorePercentage}%)`;
            
            // Generate results list
            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            
            // Create summary by section
            const sectionResults = {};
            orderedQuestions.forEach(question => {
                if (!sectionResults[question.section]) {
                    sectionResults[question.section] = {
                        total: 0,
                        correct: 0,
                        answered: 0
                    };
                }
                
                sectionResults[question.section].total++;
                
                if (userAnswers[question.id] !== undefined) {
                    sectionResults[question.section].answered++;
                    
                    if (userAnswers[question.id] === question.correctAnswer) {
                        sectionResults[question.section].correct++;
                    }
                }
            });
            
            // Add section summaries
            Object.keys(sectionResults).forEach(sectionName => {
                const sectionResult = sectionResults[sectionName];
                const sectionPercentage = sectionResult.answered > 0 ? 
                    Math.round((sectionResult.correct / sectionResult.answered) * 100) : 0;
                
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'result-item';
                sectionDiv.innerHTML = `
                    <div class="result-question result-section-title">
                        ${sectionName}
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                        <div>${t('total')} ${sectionResult.total}</div>
                        <div>${t('answeredLabel')} ${sectionResult.answered}</div>
                        <div>${t('correctLabel')} ${sectionResult.correct}</div>
                        <div>${t('percentageLabel')} ${sectionPercentage}%</div>
                    </div>
                `;
                resultsList.appendChild(sectionDiv);
            });
            
            // Add detailed results
            const detailedHeader = document.createElement('div');
            detailedHeader.className = 'result-question';
            detailedHeader.textContent = t('details');
            detailedHeader.style.marginTop = '20px';
            resultsList.appendChild(detailedHeader);
            
            orderedQuestions.forEach(question => {
                const userAnswer = userAnswers[question.id];
                const isCorrect = userAnswer === question.correctAnswer;
                
                const resultItem = document.createElement('div');
                resultItem.className = `result-item ${userAnswer !== undefined ? (isCorrect ? 'correct' : 'incorrect') : ''}`;
                
                // Question text
                const resultQuestion = document.createElement('div');
                resultQuestion.className = 'result-question';
                resultQuestion.textContent = `${question.id}. ${question.text}`;
                
                // Choices
                const resultChoices = document.createElement('div');
                resultChoices.className = 'result-choices';
                
                question.options.forEach(option => {
                    const choiceDiv = document.createElement('div');
                    choiceDiv.className = 'result-choice';
                    
                    let choiceText = formatOption(option);
                    
                    // Highlight user's choice
                    if (option.id === userAnswer) {
                        choiceDiv.classList.add('user-choice');
                    choiceText += ` ${t('yourChoice')}`;
                    }
                    
                    // Highlight correct answer
                    if (option.id === question.correctAnswer) {
                        choiceDiv.classList.add('correct-choice');
                    choiceText += ` ${t('correctChoice')}`;
                    }
                    
                    choiceDiv.textContent = choiceText;
                    resultChoices.appendChild(choiceDiv);
                });
                
                // Status indicator
                const statusDiv = document.createElement('div');
                statusDiv.style.marginTop = '10px';
                statusDiv.style.fontWeight = 'bold';
                
                if (userAnswer === undefined) {
                    statusDiv.textContent = t('noAnswer');
                    statusDiv.style.color = '#6c757d';
                } else if (isCorrect) {
                    statusDiv.textContent = t('correctStatus');
                    statusDiv.style.color = '#28a745';
                } else {
                    statusDiv.textContent = t('incorrectStatus');
                    statusDiv.style.color = '#dc3545';
                }
                
                resultItem.appendChild(resultQuestion);
                resultItem.appendChild(resultChoices);
                resultItem.appendChild(statusDiv);
                resultsList.appendChild(resultItem);
            });
            
            // Show results container
            document.getElementById('resultsContainer').style.display = 'block';
            if (btn) btn.textContent = t('hideResults');
            
            // Scroll to results
            document.getElementById('resultsContainer').scrollIntoView({ behavior: 'smooth' });
        }
        
        // Reset the test
        function resetTest() {
            if (confirm(t('resetConfirm'))) {
                userAnswers = {};
                initTest();
                document.getElementById('resultsContainer').style.display = 'none';
                const btn = document.getElementById('showResultsBtn');
                if (btn) btn.textContent = t('showResults');
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Language init
            currentLang = getInitialLanguage();
            const langToggle = document.getElementById('langToggle');
            
            // Initialize language display
            setLanguage(currentLang);
            
            if (langToggle) {
                // Toggle dropdown
                langToggle.addEventListener('click', (e) => {
                    if (e.target.closest('.lang-option')) return;
                    langToggle.classList.toggle('active');
                });
                
                // Select language
                document.querySelectorAll('.lang-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        const lang = option.dataset.lang;
                        setLanguage(lang);
                        langToggle.classList.remove('active');
                    });
                });
                
                // Close dropdown when clicking outside
                document.addEventListener('click', (e) => {
                    if (!langToggle.contains(e.target)) {
                        langToggle.classList.remove('active');
                    }
                });
            }
            applyTranslations();

            // Theme init
            applyTheme(getInitialTheme());
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                themeToggle.addEventListener('change', (e) => {
                    applyTheme(e.target.checked ? 'dark' : 'light');
                });
            }

            // Settings init
            settings = loadSettings();
            applyLetterVisibility();
            applyHeaderVisibility();
            syncSettingsUI();

            // Settings UI handlers
            const startBtn = document.getElementById('startTestBtn');
            const settingsPanel = document.getElementById('settingsPanel');

            if (startBtn) startBtn.addEventListener('click', () => {
                const next = getSettingsFromUI();
                saveSettings(next);
                if (settingsPanel) settingsPanel.style.display = 'none';
                initTest();
            });

            const sl = document.getElementById('showLettersToggle');
            const sn = document.getElementById('showQuestionNumberToggle');
            const sd = document.getElementById('showDifficultyToggle');
            const radios = document.querySelectorAll('input[name="testMode"]');
            const updateLetterAttrOnly = () => {
                const next = getSettingsFromUI();
                // моментально применяем только показ букв, без сброса
                saveSettings({ ...settings, ...next, showLetters: next.showLetters });
            };
            if (sl) sl.addEventListener('change', updateLetterAttrOnly);
            if (sn) sn.addEventListener('change', () => {
                const next = getSettingsFromUI();
                saveSettings({ ...settings, showQuestionNumber: next.showQuestionNumber });
            });
            if (sd) sd.addEventListener('change', () => {
                const next = getSettingsFromUI();
                saveSettings({ ...settings, showDifficulty: next.showDifficulty });
            });
            radios.forEach(r => r.addEventListener('change', () => {
                syncModeCards();
            }));
            
            const testTypeRadios = document.querySelectorAll('input[name="testType"]');
            testTypeRadios.forEach(r => r.addEventListener('change', () => {
                syncTestTypeCards();
            }));

            // Pager handlers
            const prevBtn = document.getElementById('prevQuestionBtn');
            const nextBtn = document.getElementById('nextQuestionBtn');
            if (prevBtn) prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderPaged();
                }
            });
            if (nextBtn) nextBtn.addEventListener('click', () => {
                if (currentIndex < orderedQuestions.length - 1) {
                    currentIndex++;
                    renderPaged();
                }
            });

            // До нажатия "Начать тест" ничего не рендерим
            
            // Add event listeners to buttons
            document.getElementById('showResultsBtn').addEventListener('click', toggleResults);
        });
    </script>
</body>
